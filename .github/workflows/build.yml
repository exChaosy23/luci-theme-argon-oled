name: Build OLED Theme

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  PACKAGE_NAME: luci-theme-argon
  PACKAGE_VERSION: 2.4.3-20250722-oled

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare OLED CSS & Font
        run: |
          if [ ! -f "htdocs/luci-static/argon/css/oled-black.css" ]; then
            echo "❌ oled-black.css not found!" && exit 1
          fi
          mkdir -p htdocs/luci-static/argon/fonts
          curl -sL "https://fonts.gstatic.com/s/vt323/v26/pxiKyp0ihIEF2isfFJXUdVNF.woff2" -o htdocs/luci-static/argon/fonts/VT323.woff2
          echo "✅ Assets prepared"

      - name: Build IPK (OpenWrt Native Format)
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          VER="${{ env.PACKAGE_VERSION }}"
          WORKSPACE="$GITHUB_WORKSPACE"
          
          DATA_DIR=$(mktemp -d)
          CTRL_DIR=$(mktemp -d)
          BUILD_DIR=$(mktemp -d)
          
          mkdir -p "$DATA_DIR"/{www/luci-static/argon,usr/share/luci}
          cp -r "$WORKSPACE/htdocs/luci-static/argon/"* "$DATA_DIR/www/luci-static/argon/"
          [ -d "$WORKSPACE/ucode" ] && cp -r "$WORKSPACE/ucode/"* "$DATA_DIR/usr/share/luci/" 2>/dev/null || true
          
          mkdir -p "$CTRL_DIR/CONTROL"
          
          printf "Package: %s\n" "$PKG" > "$CTRL_DIR/CONTROL/control"
          printf "Version: %s\n" "$VER" >> "$CTRL_DIR/CONTROL/control"
          printf "Depends: luci-base\n" >> "$CTRL_DIR/CONTROL/control"
          printf "Source: https://github.com/jerrykuku/luci-theme-argon\n" >> "$CTRL_DIR/CONTROL/control"
          printf "Section: luci\n" >> "$CTRL_DIR/CONTROL/control"
          printf "Priority: optional\n" >> "$CTRL_DIR/CONTROL/control"
          printf "Architecture: all\n" >> "$CTRL_DIR/CONTROL/control"
          printf "Maintainer: Jerrykuku <jerrykuku@qq.com>\n" >> "$CTRL_DIR/CONTROL/control"
          printf "Installed-Size: 2048\n" >> "$CTRL_DIR/CONTROL/control"
          printf "Description: Argon OLED Black Theme with VT323 pixel font\n" >> "$CTRL_DIR/CONTROL/control"
          
          sed -i 's/\r$//' "$CTRL_DIR/CONTROL/control"
          
          printf '#!/bin/sh\nexit 0\n' > "$CTRL_DIR/CONTROL/postinst"
          chmod 755 "$CTRL_DIR/CONTROL/postinst"
          printf '#!/bin/sh\nexit 0\n' > "$CTRL_DIR/CONTROL/prerm"
          chmod 755 "$CTRL_DIR/CONTROL/prerm"
          
          tar -czf "$BUILD_DIR/data.tar.gz" -C "$DATA_DIR" --transform 's,^\.,./,' .
          tar -czf "$BUILD_DIR/control.tar.gz" -C "$CTRL_DIR" --transform 's,^\.,./,' .
          printf '2.0\n' > "$BUILD_DIR/debian-binary"
          
          mkdir -p "$WORKSPACE/bin/packages"
          ar rcs "$WORKSPACE/bin/packages/${PKG}_${VER}_all.ipk" \
            "$BUILD_DIR/debian-binary" \
            "$BUILD_DIR/control.tar.gz" \
            "$BUILD_DIR/data.tar.gz"
          
          echo "✅ IPK built"
          file "$WORKSPACE/bin/packages/${PKG}_${VER}_all.ipk"
          ar t "$WORKSPACE/bin/packages/${PKG}_${VER}_all.ipk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-oled-black
          path: bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk
          retention-days: 90
