name: Build OLED Theme

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  PACKAGE_NAME: luci-theme-argon
  PACKAGE_VERSION: 2.4.3-20250722-oled

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare OLED CSS & Font
        run: |
          if [ ! -f "htdocs/luci-static/argon/css/oled-black.css" ]; then
            echo "❌ oled-black.css not found!" && exit 1
          fi
          mkdir -p htdocs/luci-static/argon/fonts
          curl -sL "https://fonts.gstatic.com/s/vt323/v26/pxiKyp0ihIEF2isfFJXUdVNF.woff2" -o htdocs/luci-static/argon/fonts/VT323.woff2
          echo "✅ Assets prepared"

      - name: Build IPK (Strict OpenWrt Format)
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          VER="${{ env.PACKAGE_VERSION }}"
          ROOT=$(mktemp -d)
          
          mkdir -p "$ROOT"/{CONTROL,www/luci-static/argon,usr/share/luci}
          cp -r htdocs/luci-static/argon/* "$ROOT/www/luci-static/argon/"
          [ -d ucode ] && cp -r ucode/* "$ROOT/usr/share/luci/" 2>/dev/null || true
          
          # 🔒 Создаём control с жесткими LF-переносами
          printf "Package: %s\nVersion: %s\nDepends: luci-base\nSource: https://github.com/jerrykuku/luci-theme-argon\nSection: luci\nPriority: optional\nArchitecture: all\nMaintainer: Jerrykuku <jerrykuku@qq.com>\nInstalled-Size: 2048\nDescription: Argon OLED Black Theme with VT323 pixel font\n\n" "$PKG" "$VER" > "$ROOT/CONTROL/control"
          
          # Убираем любые возможные \r (Windows-переносы)
          sed -i 's/\r$//' "$ROOT/CONTROL/control"
          chmod 755 "$ROOT/CONTROL/postinst" 2>/dev/null || true
          chmod 755 "$ROOT/CONTROL/prerm" 2>/dev/null || true
          
          # Собираем через dpkg-deb (стандарт для opkg)
          mkdir -p bin/packages
          dpkg-deb --build --root-owner-group "$ROOT" "bin/packages/${PKG}_${VER}_all.ipk"
          
          echo "✅ IPK built"
          file "bin/packages/${PKG}_${VER}_all.ipk"
          echo "=== Control file check ==="
          tar -xzf "bin/packages/${PKG}_${VER}_all.ipk" control.tar.gz -O 2>/dev/null | tar -xzf - control/CONTROL 2>/dev/null | head -20
          echo "=== Hex dump first 50 bytes ==="
          xxd "bin/packages/${PKG}_${VER}_all.ipk" | head -3

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-oled-black
          path: bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk
          retention-days: 90
