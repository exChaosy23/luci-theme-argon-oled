name: Build OLED Theme

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  PACKAGE_NAME: luci-theme-argon
  PACKAGE_VERSION: 2.4.3-20250722-oled

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare OLED CSS & Font
        run: |
          if [ ! -f "htdocs/luci-static/argon/css/oled-black.css" ]; then
            echo "❌ oled-black.css not found!" && exit 1
          fi
          mkdir -p htdocs/luci-static/argon/fonts
          curl -sL "https://fonts.gstatic.com/s/vt323/v26/pxiKyp0ihIEF2isfFJXUdVNF.woff2" -o htdocs/luci-static/argon/fonts/VT323.woff2
          echo "✅ Assets prepared"

      - name: Build IPK (Strict OpenWrt Format)
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          VER="${{ env.PACKAGE_VERSION }}"
          ROOT=$(mktemp -d)
          
          # Структура пакета
          mkdir -p "$ROOT"/{CONTROL,www/luci-static/argon,usr/share/luci}
          
          # Копируем файлы
          cp -r htdocs/luci-static/argon/* "$ROOT/www/luci-static/argon/"
          [ -d ucode ] && cp -r ucode/* "$ROOT/usr/share/luci/" || true
          
          # DEBIAN/CONTROL файл (строгий формат OpenWrt)
          printf "Package: %s\nVersion: %s\nDepends: luci-base\nSection: luci\nPriority: optional\nArchitecture: all\nMaintainer: Jerrykuku <jerrykuku@qq.com>\nSource: https://github.com/jerrykuku/luci-theme-argon\nDescription: Argon OLED Black Theme with VT323 pixel font\n\n" "$PKG" "$VER" > "$ROOT/CONTROL/control"
          
          # Скрипты установки/удаления
          printf '#!/bin/sh\nexit 0\n' > "$ROOT/CONTROL/postinst"
          chmod 755 "$ROOT/CONTROL/postinst"
          printf '#!/bin/sh\nexit 0\n' > "$ROOT/CONTROL/prerm"
          chmod 755 "$ROOT/CONTROL/prerm"
          
          # Сборка архивов с ЯВНЫМ gzip (opkg не понимает zstd/xz)
          tar -czf /tmp/control.tar.gz -C "$ROOT/CONTROL" .
          tar -czf /tmp/data.tar.gz -C "$ROOT" .
          echo "2.0" > /tmp/debian-binary
          
          # Формируем .ipk
          mkdir -p bin/packages
          ar rcs "bin/packages/${PKG}_${VER}_all.ipk" /tmp/debian-binary /tmp/control.tar.gz /tmp/data.tar.gz
          
          echo "✅ IPK built successfully"
          file "bin/packages/${PKG}_${VER}_all.ipk"
          echo "=== Archive structure ==="
          ar t "bin/packages/${PKG}_${VER}_all.ipk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-oled-black
          path: bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
