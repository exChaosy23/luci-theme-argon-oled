name: Build OLED Theme

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  PACKAGE_NAME: luci-theme-argon
  PACKAGE_VERSION: 2.4.3-20250722-oled

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare OLED CSS & Font
        run: |
          if [ ! -f "htdocs/luci-static/argon/css/oled-black.css" ]; then
            echo "❌ oled-black.css not found!"
            exit 1
          fi
          mkdir -p htdocs/luci-static/argon/fonts
          curl -sL "https://fonts.gstatic.com/s/vt323/v26/pxiKyp0ihIEF2isfFJXUdVNF.woff2" \
            -o htdocs/luci-static/argon/fonts/VT323.woff2
          echo "✅ OLED assets prepared"

      - name: Build IPK (ar format)
        run: |
          WORKSPACE="$GITHUB_WORKSPACE"
          BUILD_DIR=$(mktemp -d)
          DATA_DIR=$(mktemp -d)
          CTRL_DIR=$(mktemp -d)
          
          mkdir -p "$DATA_DIR"/{www/luci-static/argon,usr/share/luci}
          mkdir -p "$CTRL_DIR/CONTROL"
          
          # 1. Копируем файлы интерфейса
          cp -r "$WORKSPACE/htdocs/luci-static/argon/"* "$DATA_DIR/www/luci-static/argon/"
          [ -d "$WORKSPACE/ucode" ] && cp -r "$WORKSPACE/ucode/"* "$DATA_DIR/usr/share/luci/" 2>/dev/null || true
          
          # 2. Создаём control
          printf "Package: %s\n" "${{ env.PACKAGE_NAME }}" > "$CTRL_DIR/CONTROL/control"
          printf "Version: %s\n" "${{ env.PACKAGE_VERSION }}" >> "$CTRL_DIR/CONTROL/control"
          printf "Depends: luci-base\n" >> "$CTRL_DIR/CONTROL/control"
          printf "Source: https://github.com/jerrykuku/luci-theme-argon\n" >> "$CTRL_DIR/CONTROL/control"
          printf "SourceName: %s\n" "${{ env.PACKAGE_NAME }}" >> "$CTRL_DIR/CONTROL/control"
          printf "Section: luci\n" >> "$CTRL_DIR/CONTROL/control"
          printf "SourceDateEpoch: %s\n" "$(date +%s)" >> "$CTRL_DIR/CONTROL/control"
          printf "Maintainer: Jerrykuku <jerrykuku@qq.com>\n" >> "$CTRL_DIR/CONTROL/control"
          printf "Architecture: all\n" >> "$CTRL_DIR/CONTROL/control"
          printf "Installed-Size: 0\n" >> "$CTRL_DIR/CONTROL/control"
          printf "Description: Argon OLED Black Theme with VT323 pixel font\n" >> "$CTRL_DIR/CONTROL/control"
          
          # Скрипты установки/удаления
          printf '#!/bin/sh\n[ -n "${IPKG_INSTROOT}" ] || { exit 0; }\n' > "$CTRL_DIR/CONTROL/postinst"
          chmod 755 "$CTRL_DIR/CONTROL/postinst"
          printf '#!/bin/sh\n[ -n "${IPKG_INSTROOT}" ] || { exit 0; }\n' > "$CTRL_DIR/CONTROL/prerm"
          chmod 755 "$CTRL_DIR/CONTROL/prerm"
          
          # 3. Создаём data.tar.gz (только payload)
          tar -czf "$BUILD_DIR/data.tar.gz" -C "$DATA_DIR" .
          
          # 4. Создаём control.tar.gz (только метаданные)
          tar -czf "$BUILD_DIR/control.tar.gz" -C "$CTRL_DIR" .
          
          # 5. Создаём debian-binary
          echo "2.0" > "$BUILD_DIR/debian-binary"
          
          # 6. Собираем .ipk через ar (правильный формат для opkg)
          mkdir -p "$WORKSPACE/bin/packages"
          ar rcs "$WORKSPACE/bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk" \
            "$BUILD_DIR/debian-binary" \
            "$BUILD_DIR/control.tar.gz" \
            "$BUILD_DIR/data.tar.gz"
          
          echo "✅ IPK created successfully"
          ls -lh "$WORKSPACE/bin/packages/"
          echo "=== .ipk internal structure ==="
          ar t "$WORKSPACE/bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-oled-black
          path: bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
