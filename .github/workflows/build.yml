name: Build OLED Theme

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  PACKAGE_NAME: luci-theme-argon
  PACKAGE_VERSION: 2.4.3-20250722-oled

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare OLED CSS & Font
        run: |
          if [ ! -f "htdocs/luci-static/argon/css/oled-black.css" ]; then
            echo "❌ oled-black.css not found!"
            exit 1
          fi
          mkdir -p htdocs/luci-static/argon/fonts
          curl -sL "https://fonts.gstatic.com/s/vt323/v26/pxiKyp0ihIEF2isfFJXUdVNF.woff2" -o htdocs/luci-static/argon/fonts/VT323.woff2
          echo "✅ Assets prepared"

      - name: Build IPK via dpkg-deb
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          VER="${{ env.PACKAGE_VERSION }}"
          ROOT=$(mktemp -d)
          
          # Создаём структуру пакета (пути = пути установки в OpenWrt)
          mkdir -p "$ROOT"/{DEBIAN,www/luci-static/argon,usr/share/luci}
          
          # Копируем статические файлы (CSS, шрифты, картинки)
          cp -r htdocs/luci-static/argon/* "$ROOT/www/luci-static/argon/"
          
          # Копируем ucode-шаблоны (если есть)
          [ -d ucode ] && cp -r ucode/* "$ROOT/usr/share/luci/" || true
          
          # Создаём DEBIAN/control (без heredoc, чтобы избежать ошибок YAML)
          printf "Package: %s\n" "$PKG" > "$ROOT/DEBIAN/control"
          printf "Version: %s\n" "$VER" >> "$ROOT/DEBIAN/control"
          printf "Depends: luci-base\n" >> "$ROOT/DEBIAN/control"
          printf "Source: https://github.com/jerrykuku/luci-theme-argon\n" >> "$ROOT/DEBIAN/control"
          printf "Section: luci\n" >> "$ROOT/DEBIAN/control"
          printf "SourceDateEpoch: %s\n" "$(date +%s)" >> "$ROOT/DEBIAN/control"
          printf "Maintainer: Jerrykuku <jerrykuku@qq.com>\n" >> "$ROOT/DEBIAN/control"
          printf "Architecture: all\n" >> "$ROOT/DEBIAN/control"
          printf "Installed-Size: 2048\n" >> "$ROOT/DEBIAN/control"
          printf "Description: Argon OLED Black Theme with VT323 pixel font\n" >> "$ROOT/DEBIAN/control"
          
          # Убираем world-writable permissions (требование dpkg-deb)
          chmod -R go-w "$ROOT"
          
          # Собираем валидный .ipk
          mkdir -p bin/packages
          dpkg-deb --build --root-owner-group "$ROOT" "bin/packages/${PKG}_${VER}_all.ipk"
          
          echo "✅ IPK built successfully"
          file "bin/packages/${PKG}_${VER}_all.ipk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-oled-black
          path: bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
