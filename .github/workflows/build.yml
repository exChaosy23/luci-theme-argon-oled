- name: Build IPK manually
  run: |
    # Создаём структуру пакета
    mkdir -p package/luci-theme-argon/CONTROL
    mkdir -p package/luci-theme-argon/www/luci-static/argon
    
    # Копируем файлы
    cp -r htdocs/luci-static/argon/* package/luci-theme-argon/www/luci-static/argon/
    cp -r ucode package/luci-theme-argon/usr/share/luci/ 2>/dev/null || true
    cp Makefile package/luci-theme-argon/
    
    # Создаём control-файл
    cat > package/luci-theme-argon/CONTROL/control << EOF
    Package: luci-theme-argon
    Version: ${PKG_VERSION:-1.0}
    Depends: luci-base
    Source: https://github.com/jerrykuku/luci-theme-argon
    SourceName: luci-theme-argon
    Section: luci
    SourceDateEpoch: $(date +%s)
    Maintainer: Jerrykuku <jerrykuku@qq.com>
    Architecture: all
    Installed-Size: 0
    Description: Argon OLED Black Theme with pixel font
    EOF
    
    # Создаём conffiles (если есть конфиги)
    # echo "/etc/config/argon" > package/luci-theme-argon/CONTROL/conffiles
    
    # Собираем .ipk (требуется opkg-utils или dpkg-deb)
    mkdir -p bin/packages
    cd package/luci-theme-argon
    tar -czf ../../bin/packages/luci-theme-argon_${PKG_VERSION:-1.0}_all.ipk \
      -C . www ucode CONTROL/Makefile 2>/dev/null || \
    tar -czf ../../bin/packages/luci-theme-argon_${PKG_VERSION:-1.0}_all.ipk .
    
    echo "✅ IPK created:"
    ls -la ../../bin/packages/
