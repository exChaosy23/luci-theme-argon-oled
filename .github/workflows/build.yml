name: Build OLED Theme

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare OLED CSS & Font
        run: |
          # CSS уже готов в репозитории, просто проверяем наличие
          if [ ! -f "htdocs/luci-static/argon/css/oled-black.css" ]; then
            echo "❌ oled-black.css not found!"
            exit 1
          fi
          
          # Создаём папку для шрифтов и скачиваем VT323
          mkdir -p htdocs/luci-static/argon/fonts
          curl -sL "https://fonts.gstatic.com/s/vt323/v26/pxiKyp0ihIEF2isfFJXUdVNF.woff2" \
            -o htdocs/luci-static/argon/fonts/VT323.woff2
          
          echo "✅ OLED assets prepared"

      - name: Build IPK with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v5
        with:
          arch: x86_64
          feedname: luci

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-theme-argon-oled-black
          path: bin/packages/x86_64/luci/luci-theme-argon_*.ipk
          retention-days: 90
