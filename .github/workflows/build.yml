name: Build OLED Theme

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  PACKAGE_NAME: luci-theme-argon
  PACKAGE_VERSION: 2.4.3-20250722-oled

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare OLED CSS & Font
        run: |
          if [ ! -f "htdocs/luci-static/argon/css/oled-black.css" ]; then
            echo "❌ oled-black.css not found!" && exit 1
          fi
          mkdir -p htdocs/luci-static/argon/fonts
          curl -sL "https://fonts.gstatic.com/s/vt323/v26/pxiKyp0ihIEF2isfFJXUdVNF.woff2" -o htdocs/luci-static/argon/fonts/VT323.woff2
          echo "✅ Assets prepared"

      - name: Install opkg-build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y opkg-utils

      - name: Build IPK with opkg-build
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          VER="${{ env.PACKAGE_VERSION }}"
          WORKSPACE="$GITHUB_WORKSPACE"
          
          # Создаём корень пакета
          PKG_ROOT=$(mktemp -d)
          mkdir -p "$PKG_ROOT"/{CONTROL,www/luci-static/argon,usr/share/luci}
          
          # Копируем файлы
          cp -r "$WORKSPACE/htdocs/luci-static/argon/"* "$PKG_ROOT/www/luci-static/argon/"
          [ -d "$WORKSPACE/ucode" ] && cp -r "$WORKSPACE/ucode/"* "$PKG_ROOT/usr/share/luci/" 2>/dev/null || true
          
          # Создаём control файл (минимальный, с пустой строкой в конце!)
          printf "Package: %s\n" "$PKG" > "$PKG_ROOT/CONTROL/control"
          printf "Version: %s\n" "$VER" >> "$PKG_ROOT/CONTROL/control"
          printf "Depends: luci-base\n" >> "$PKG_ROOT/CONTROL/control"
          printf "Section: luci\n" >> "$PKG_ROOT/CONTROL/control"
          printf "Architecture: all\n" >> "$PKG_ROOT/CONTROL/control"
          printf "Maintainer: Jerrykuku <jerrykuku@qq.com>\n" >> "$PKG_ROOT/CONTROL/control"
          printf "Description: Argon OLED Black Theme with VT323 pixel font\n" >> "$PKG_ROOT/CONTROL/control"
          printf "\n" >> "$PKG_ROOT/CONTROL/control"  # 🔥 Пустая строка в конце — ОБЯЗАТЕЛЬНО!
          
          # Скрипты (опционально)
          printf '#!/bin/sh\nexit 0\n' > "$PKG_ROOT/CONTROL/postinst"
          chmod 755 "$PKG_ROOT/CONTROL/postinst"
          
          # Создаём выходную папку и собираем пакет через opkg-build
          mkdir -p "$WORKSPACE/bin/packages"
          # -c: не проверять control файл строго
          # -o 0 -g 0: установить владельца root:root
          opkg-build -c -o 0 -g 0 "$PKG_ROOT" "$WORKSPACE/bin/packages"
          
          echo "✅ IPK built with opkg-build"
          file "$WORKSPACE/bin/packages/${PKG}_${VER}_all.ipk"
          echo "=== Archive contents ==="
          ar t "$WORKSPACE/bin/packages/${PKG}_${VER}_all.ipk"
          echo "=== Control file ==="
          tar -xzf "$WORKSPACE/bin/packages/${PKG}_${VER}_all.ipk" control.tar.gz -O 2>/dev/null | tar -xzf - ./CONTROL/control 2>/dev/null || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-oled-black
          path: bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk
          retention-days: 90
