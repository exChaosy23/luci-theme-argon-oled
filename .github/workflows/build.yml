name: Build OLED Theme

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  PACKAGE_NAME: luci-theme-argon
  PACKAGE_VERSION: 2.4.3-20250722-oled

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Assets
        run: |
          test -f htdocs/luci-static/argon/css/oled-black.css || { echo "CSS not found"; exit 1; }
          mkdir -p htdocs/luci-static/argon/fonts
          curl -sLo htdocs/luci-static/argon/fonts/VT323.woff2 "https://fonts.gstatic.com/s/vt323/v26/pxiKyp0ihIEF2isfFJXUdVNF.woff2"

      - name: Build IPK
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          VER="${{ env.PACKAGE_VERSION }}"
          WS="$GITHUB_WORKSPACE"
          D=$(mktemp -d)
          C=$(mktemp -d)
          B=$(mktemp -d)
          
          mkdir -p "$D/www/luci-static/argon" "$D/usr/share/luci"
          cp -r "$WS/htdocs/luci-static/argon/"* "$D/www/luci-static/argon/"
          [ -d "$WS/ucode" ] && cp -r "$WS/ucode/"* "$D/usr/share/luci/" || true
          
          mkdir -p "$C/CONTROL"
          
          # Создаём control файл через printf (НИКАКИХ heredoc!)
          printf "Package: %s\n" "$PKG" > "$C/CONTROL/control"
          printf "Version: %s\n" "$VER" >> "$C/CONTROL/control"
          printf "Depends: luci-base\n" >> "$C/CONTROL/control"
          printf "Section: luci\n" >> "$C/CONTROL/control"
          printf "Architecture: all\n" >> "$C/CONTROL/control"
          printf "Maintainer: Jerrykuku <jerrykuku@qq.com>\n" >> "$C/CONTROL/control"
          printf "Description: Argon OLED Black Theme\n" >> "$C/CONTROL/control"
          printf "\n" >> "$C/CONTROL/control"
          
          printf '#!/bin/sh\nexit 0\n' > "$C/CONTROL/postinst"
          chmod 755 "$C/CONTROL/postinst"
          
          tar -czf "$B/data.tar.gz" -C "$D" --transform 's,^\.,./,' .
          tar -czf "$B/control.tar.gz" -C "$C" --transform 's,^\.,./,' .
          printf '2.0\n' > "$B/debian-binary"
          
          mkdir -p "$WS/bin/packages"
          OUT="$WS/bin/packages/${PKG}_${VER}_all.ipk"
          ar rcs "$OUT" "$B/debian-binary" "$B/control.tar.gz" "$B/data.tar.gz"
          
          echo "✅ Built: $OUT"
          file "$OUT"
          ar t "$OUT"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-oled-black
          path: bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk
          retention-days: 90
