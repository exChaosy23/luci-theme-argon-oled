name: Build OLED Theme

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  PACKAGE_NAME: luci-theme-argon
  PACKAGE_VERSION: 2.4.3-20250722-oled

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Assets
        run: |
          test -f htdocs/luci-static/argon/css/oled-black.css || { echo "CSS not found"; exit 1; }
          mkdir -p htdocs/luci-static/argon/fonts
          curl -sLo htdocs/luci-static/argon/fonts/VT323.woff2 "https://fonts.gstatic.com/s/vt323/v26/pxiKyp0ihIEF2isfFJXUdVNF.woff2"

      - name: Build IPK via dpkg-deb + convert
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          VER="${{ env.PACKAGE_VERSION }}"
          WS="$GITHUB_WORKSPACE"
          
          # 1. Создаём структуру для dpkg-deb (требует DEBIAN)
          ROOT=$(mktemp -d)
          mkdir -p "$ROOT"/{DEBIAN,www/luci-static/argon,usr/share/luci}
          
          # Копируем файлы темы
          cp -r "$WS/htdocs/luci-static/argon/"* "$ROOT/www/luci-static/argon/"
          [ -d "$WS/ucode" ] && cp -r "$WS/ucode/"* "$ROOT/usr/share/luci/" || true
          
          # Создаём control для dpkg (DEBIAN/control)
          printf "Package: %s\n" "$PKG" > "$ROOT/DEBIAN/control"
          printf "Version: %s\n" "$VER" >> "$ROOT/DEBIAN/control"
          printf "Depends: luci-base\n" >> "$ROOT/DEBIAN/control"
          printf "Section: luci\n" >> "$ROOT/DEBIAN/control"
          printf "Architecture: all\n" >> "$ROOT/DEBIAN/control"
          printf "Maintainer: Jerrykuku <jerrykuku@qq.com>\n" >> "$ROOT/DEBIAN/control"
          printf "Description: Argon OLED Black Theme\n" >> "$ROOT/DEBIAN/control"
          printf "\n" >> "$ROOT/DEBIAN/control"
          
          printf '#!/bin/sh\nexit 0\n' > "$ROOT/DEBIAN/postinst"
          chmod 755 "$ROOT/DEBIAN/postinst"
          
          # 2. Собираем .deb через dpkg-deb (создаёт валидный ar-архив)
          mkdir -p "$WS/bin/packages"
          DEB="$WS/bin/packages/${PKG}_${VER}_all.deb"
          dpkg-deb --build --root-owner-group "$ROOT" "$DEB"
          
          # 3. Конвертируем .deb → .ipk: переименовываем DEBIAN → CONTROL внутри control.tar.gz
          IPK="$WS/bin/packages/${PKG}_${VER}_all.ipk"
          TMP=$(mktemp -d)
          
          # Извлекаем компоненты из .deb
          cd "$TMP"
          ar x "$DEB"
          
          # Перепаковываем control.tar.gz с заменой DEBIAN → CONTROL
          mkdir ctrl data
          tar -xzf control.tar.gz -C ctrl
          tar -xzf data.tar.gz -C data
          
          # Переименовываем DEBIAN → CONTROL
          [ -d ctrl/DEBIAN ] && mv ctrl/DEBIAN ctrl/CONTROL
          
          # Создаём новые архивы
          tar -czf control.tar.gz -C ctrl --transform 's,^\.,./,' .
          tar -czf data.tar.gz -C data --transform 's,^\.,./,' .
          
          # Собираем финальный .ipk (используем ar из того же места, что создал валидный .deb)
          ar rcs "$IPK" debian-binary control.tar.gz data.tar.gz
          
          echo "✅ Built: $IPK"
          file "$IPK"
          echo "=== Archive ===" && ar t "$IPK"
          echo "=== Control ===" && tar -xOf "$IPK" control.tar.gz | tar -xzf - ./CONTROL/control 2>/dev/null || tar -xOf "$IPK" control.tar.gz | tar -xzf - CONTROL/control

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-oled-black
          path: bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk
          retention-days: 90
