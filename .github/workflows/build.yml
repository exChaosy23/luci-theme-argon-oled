name: Build OLED Theme

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  PACKAGE_NAME: luci-theme-argon
  PACKAGE_VERSION: 2.4.3-20250722-oled

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare OLED CSS & Font
        run: |
          if [ ! -f "htdocs/luci-static/argon/css/oled-black.css" ]; then
            echo "❌ oled-black.css not found!"
            exit 1
          fi
          mkdir -p htdocs/luci-static/argon/fonts
          curl -sL "https://fonts.gstatic.com/s/vt323/v26/pxiKyp0ihIEF2isfFJXUdVNF.woff2" \
            -o htdocs/luci-static/argon/fonts/VT323.woff2
          echo "✅ OLED assets prepared"

      - name: Build IPK manually
        run: |
          WORKSPACE="$GITHUB_WORKSPACE"
          PKG_ROOT=$(mktemp -d)
          mkdir -p "$PKG_ROOT"/{CONTROL,usr/share/luci,www/luci-static/argon}
          
          cp -r "$WORKSPACE/htdocs/luci-static/argon/"* "$PKG_ROOT/www/luci-static/argon/"
          [ -d "$WORKSPACE/ucode" ] && cp -r "$WORKSPACE/ucode/"* "$PKG_ROOT/usr/share/luci/" 2>/dev/null || true
          
          printf "Package: %s\n" "${{ env.PACKAGE_NAME }}" > "$PKG_ROOT/CONTROL/control"
          printf "Version: %s\n" "${{ env.PACKAGE_VERSION }}" >> "$PKG_ROOT/CONTROL/control"
          printf "Depends: luci-base\n" >> "$PKG_ROOT/CONTROL/control"
          printf "Source: https://github.com/jerrykuku/luci-theme-argon\n" >> "$PKG_ROOT/CONTROL/control"
          printf "SourceName: %s\n" "${{ env.PACKAGE_NAME }}" >> "$PKG_ROOT/CONTROL/control"
          printf "Section: luci\n" >> "$PKG_ROOT/CONTROL/control"
          printf "SourceDateEpoch: %s\n" "$(date +%s)" >> "$PKG_ROOT/CONTROL/control"
          printf "Maintainer: Jerrykuku <jerrykuku@qq.com>\n" >> "$PKG_ROOT/CONTROL/control"
          printf "Architecture: all\n" >> "$PKG_ROOT/CONTROL/control"
          printf "Installed-Size: 0\n" >> "$PKG_ROOT/CONTROL/control"
          printf "Description: Argon OLED Black Theme with VT323 pixel font\n" >> "$PKG_ROOT/CONTROL/control"
          
          printf '#!/bin/sh\n[ -n "${IPKG_INSTROOT}" ] || { exit 0; }\n' > "$PKG_ROOT/CONTROL/postinst"
          chmod 755 "$PKG_ROOT/CONTROL/postinst"
          printf '#!/bin/sh\n[ -n "${IPKG_INSTROOT}" ] || { exit 0; }\n' > "$PKG_ROOT/CONTROL/prerm"
          chmod 755 "$PKG_ROOT/CONTROL/prerm"
          
          mkdir -p "$WORKSPACE/bin/packages"
          tar -czf "$WORKSPACE/bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk" -C "$PKG_ROOT" .
          
          echo "✅ IPK created:"
          ls -lh "$WORKSPACE/bin/packages/"

      - name: Verify IPK structure
        run: |
          echo "=== IPK Contents ==="
          tar -tzf "$GITHUB_WORKSPACE/bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk" | head -30

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-oled-black
          path: bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/packages/${{ env.PACKAGE_NAME }}_${{ env.PACKAGE_VERSION }}_all.ipk
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
